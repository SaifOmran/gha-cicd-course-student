name: 02 CI Workflow

on:
  schedule:
    - cron: "18 10 * * *"
  workflow_dispatch:
jobs:
  ci:
    strategy:
      matrix:
        python-version: [python3.11, python3.12]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List files
        run: |
          echo "📂 Files in repo:"
          ls -R

      - name: Show time (UTC)
        run: date

      - name: Show Egypt time
        run: TZ="Africa/Cairo" date

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Python version
        run: python --version

      - name: Install dependencies (optional)
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run tests
        run: python -m unittest discover -s tests -v